<!DOCTYPE html>
 <html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Late Train</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">

  <main class="flex-1 flex items-center justify-center px-4">
    <div class="w-full max-w-md">

      <!-- Logo / Title -->
      <div class="text-center mb-10">
        <div class="text-5xl mb-4">🚂</div>
        <h1 class="text-3xl font-bold tracking-tight">My Late Train</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-2 text-sm">Track your commute. Understand your delays.</p>
      </div>

      <!-- Route form -->
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-md border border-gray-200 dark:border-gray-700 p-6">
        <form id="routeForm" onsubmit="go(event)">

          <!-- From -->
          <div class="mb-4">
            <label for="fromInput" class="block text-xs font-semibold uppercase tracking-widest text-gray-500 dark:text-gray-400 mb-1.5">From</label>
            <div class="relative">
              <input
                id="fromInput"
                type="text"
                autocomplete="off"
                placeholder="e.g. London Bridge"
                class="w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400"
              >
              <input type="hidden" id="fromCrs">
              <div id="fromDropdown" class="absolute z-10 left-0 right-0 mt-1 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg hidden max-h-56 overflow-y-auto"></div>
            </div>
          </div>

          <!-- Swap button -->
          <div class="flex justify-center my-3">
            <button
              type="button"
              onclick="swapStations()"
              class="w-9 h-9 flex items-center justify-center rounded-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 text-gray-500 dark:text-gray-300 transition-colors"
              title="Swap stations"
            >⇅</button>
          </div>

          <!-- To -->
          <div class="mb-6">
            <label for="toInput" class="block text-xs font-semibold uppercase tracking-widest text-gray-500 dark:text-gray-400 mb-1.5">To</label>
            <div class="relative">
              <input
                id="toInput"
                type="text"
                autocomplete="off"
                placeholder="e.g. Brighton"
                class="w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400"
              >
              <input type="hidden" id="toCrs">
              <div id="toDropdown" class="absolute z-10 left-0 right-0 mt-1 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg hidden max-h-56 overflow-y-auto"></div>
            </div>
          </div>

          <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors text-base"
          >
            View my trains →
          </button>

          <p id="errorMsg" class="text-red-500 text-sm text-center mt-3 hidden">Please select both a departure and arrival station.</p>
        </form>
      </div>

    </div>
  </main>

  <footer class="text-center text-xs text-gray-400 dark:text-gray-600 py-4">
    Data: Realtime Trains · National Rail HSP · Network Rail
  </footer>

<script>
let stations = [];

// Fetch station list once
fetch('/api/stations').then(r => r.json()).then(data => {
  stations = data;
  // Pre-fill from localStorage if available
  const saved = JSON.parse(localStorage.getItem('mlt_route') || 'null');
  if (saved) {
    setStation('from', saved.fromName, saved.fromCrs);
    setStation('to', saved.toName, saved.toCrs);
  }
});

function setStation(which, name, crs) {
  document.getElementById(which + 'Input').value = name;
  document.getElementById(which + 'Crs').value = crs;
}

function makeAutocomplete(inputId, dropdownId, crsId) {
  const input = document.getElementById(inputId);
  const dropdown = document.getElementById(dropdownId);
  const crsInput = document.getElementById(crsId);

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    crsInput.value = '';  // clear CRS until user selects
    if (q.length < 1) { dropdown.classList.add('hidden'); return; }

    const matches = stations.filter(s =>
      s.name.toLowerCase().includes(q) || s.crs.toLowerCase().startsWith(q)
    ).slice(0, 8);

    if (!matches.length) { dropdown.classList.add('hidden'); return; }

    dropdown.innerHTML = matches.map(s => `
      <div class="px-4 py-2.5 cursor-pointer hover:bg-blue-50 dark:hover:bg-gray-600 flex justify-between items-center text-sm"
           data-name="${s.name}" data-crs="${s.crs}">
        <span>${s.name}</span>
        <span class="text-xs text-gray-400 font-mono">${s.crs}</span>
      </div>
    `).join('');
    dropdown.classList.remove('hidden');

    dropdown.querySelectorAll('[data-crs]').forEach(el => {
      el.addEventListener('click', () => {
        input.value = el.dataset.name;
        crsInput.value = el.dataset.crs;
        dropdown.classList.add('hidden');
      });
    });
  });

  // Close dropdown on outside click
  document.addEventListener('click', e => {
    if (!input.contains(e.target) && !dropdown.contains(e.target)) {
      dropdown.classList.add('hidden');
    }
  });

  // Keyboard navigation
  input.addEventListener('keydown', e => {
    const items = dropdown.querySelectorAll('[data-crs]');
    const active = dropdown.querySelector('.bg-blue-100');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      const next = active ? active.nextElementSibling : items[0];
      if (active) active.classList.remove('bg-blue-100', 'dark:bg-gray-500');
      if (next) next.classList.add('bg-blue-100', 'dark:bg-gray-500');
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      const prev = active ? active.previousElementSibling : items[items.length - 1];
      if (active) active.classList.remove('bg-blue-100', 'dark:bg-gray-500');
      if (prev) prev.classList.add('bg-blue-100', 'dark:bg-gray-500');
    } else if (e.key === 'Enter') {
      if (active) {
        e.preventDefault();
        input.value = active.dataset.name;
        crsInput.value = active.dataset.crs;
        dropdown.classList.add('hidden');
      }
    } else if (e.key === 'Escape') {
      dropdown.classList.add('hidden');
    }
  });
}

makeAutocomplete('fromInput', 'fromDropdown', 'fromCrs');
makeAutocomplete('toInput', 'toDropdown', 'toCrs');

function swapStations() {
  const fromName = document.getElementById('fromInput').value;
  const fromCrs  = document.getElementById('fromCrs').value;
  const toName   = document.getElementById('toInput').value;
  const toCrs    = document.getElementById('toCrs').value;
  setStation('from', toName, toCrs);
  setStation('to', fromName, fromCrs);
}

function go(e) {
  e.preventDefault();
  const fromCrs = document.getElementById('fromCrs').value;
  const toCrs   = document.getElementById('toCrs').value;
  const fromName = document.getElementById('fromInput').value.trim();
  const toName   = document.getElementById('toInput').value.trim();

  if (!fromCrs || !toCrs) {
    document.getElementById('errorMsg').classList.remove('hidden');
    return;
  }
  document.getElementById('errorMsg').classList.add('hidden');

  localStorage.setItem('mlt_route', JSON.stringify({ fromCrs, fromName, toCrs, toName }));
  window.location.href = `/dashboard?from=${fromCrs}&to=${toCrs}`;
}
</script>

</body>
</html>
