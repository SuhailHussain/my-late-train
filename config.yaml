route:
  origin: LBG          # CRS code for origin station (e.g. LBG = London Bridge)
  destination: BTN      # CRS code for destination station (e.g. BTN = Brighton)
  # Optionally pin specific service UIDs. Leave empty to track all services on the route.
  # UIDs change with timetable updates (May and December). Re-confirm twice a year.
  service_uids: []

commute_windows:
  morning:
    start: "07:00"
    end: "09:30"
  evening:
    start: "17:00"
    end: "19:30"

poll_interval_seconds: 180  # 3 minutes — used as documentation; actual polling is driven by cron

apis:
  rtt:
    base_url: "https://data.rtt.io"
    # Long-lived refresh token from api-portal.rtt.io
    # Used automatically to obtain short-lived access tokens
    refresh_token: "${RTT_REFRESH_TOKEN}"
  hsp:
    base_url: "https://api1.raildata.org.uk/1010-historical-service-performance-_hsp_v1/api/v1"
    api_key: "${HSP_API_KEY}"

attribution:
  csv_directory: "./data/attribution"

database:
  path: "./data/late_train.db"

logging:
  level: "INFO"
  file: "./data/logs/late_train.log"
